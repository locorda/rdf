name: locorda_rdf_core
description: >-
  A Dart library for RDF with Turtle, TriG, N-Triples, and N-Quads parsers.
  Type-safe RDF graph model for linked data and knowledge graph applications.
version: 0.12.2
resolution: workspace
homepage: https://locorda.dev/rdf/core
repository: https://github.com/locorda/rdf
issue_tracker: https://github.com/locorda/rdf/issues
documentation: https://locorda.dev/rdf/core
topics:
  - rdf
  - linked-data
  - semantic-web
  - knowledge-graph
  - turtle
readme: README.md
changelog: CHANGELOG.md
license: LICENSE
maintainers:
  - "Klas Kalaß <habbatical@gmail.com>"

environment:
  sdk: ^3.6.0

# Add regular dependencies here.
dependencies:
  logging: ^1.2.0

dev_dependencies:
  locorda_rdf_canonicalization: ^0.12.2
  test: ^1.25.0
  yaml: ^3.1.0
  path: ^1.8.0
  lints: ^6.0.0
