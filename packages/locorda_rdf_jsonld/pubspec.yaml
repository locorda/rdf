name: locorda_rdf_jsonld
description: >-
  JSON-LD 1.1 codec for Locorda RDF: parse and serialize RDF graphs with
  context support, compact/expanded/flattened output, and pre-loaded
  external contexts.
version: 0.12.0
resolution: workspace
homepage: https://locorda.dev/rdf/jsonld
repository: https://github.com/locorda/rdf
issue_tracker: https://github.com/locorda/rdf/issues
documentation: https://locorda.dev/rdf/jsonld
topics:
  - rdf
  - linked-data
  - semantic-web
  - json-ld
  - serialization
readme: README.md
changelog: CHANGELOG.md
license: LICENSE
maintainers:
  - "Klas Kalaß <habbatical@gmail.com>"

environment:
  sdk: ^3.6.0

# Add regular dependencies here.
dependencies:
  locorda_rdf_core: ^0.12.0
  locorda_rdf_terms_core: ^0.12.0
  logging: ^1.2.0

dev_dependencies:
  locorda_rdf_terms_common: ^0.12.0
  locorda_rdf_canonicalization: ^0.12.0
  test: ^1.25.0
  yaml: ^3.1.0
  path: ^1.8.0
  lints: ^6.0.0
