name: locorda_rdf_jsonld
description: >-
  A Dart JSON-LD 1.1 parser and serializer for RDF graphs. Compact, expanded,
  and flattened output with context support. Linked data codec for knowledge
  graph applications.
version: 0.12.2
resolution: workspace
homepage: https://locorda.dev/rdf/jsonld
repository: https://github.com/locorda/rdf
issue_tracker: https://github.com/locorda/rdf/issues
documentation: https://locorda.dev/rdf/jsonld
topics:
  - rdf
  - linked-data
  - semantic-web
  - json-ld
  - knowledge-graph
readme: README.md
changelog: CHANGELOG.md
license: LICENSE
maintainers:
  - "Klas Kalaß <habbatical@gmail.com>"

environment:
  sdk: ^3.6.0

# Add regular dependencies here.
dependencies:
  locorda_rdf_core: ^0.12.2
  locorda_rdf_terms_core: ^0.12.2
  logging: ^1.2.0

dev_dependencies:
  locorda_rdf_terms_common: ^0.12.0
  locorda_rdf_canonicalization: ^0.12.2
  test: ^1.25.0
  yaml: ^3.1.0
  path: ^1.8.0
  lints: ^6.0.0
